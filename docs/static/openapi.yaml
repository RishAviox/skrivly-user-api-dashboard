openapi: 3.0.3
info:
  title: Skrivly Developer API
  description: |
    The Skrivly Developer API lets you programmatically interact with your organization's documents, signers, and workflows using a Developer API Key.

    ## Authentication
    All endpoints require a Bearer token (your Developer API Key):
    ```
    Authorization: Bearer YOUR_API_KEY
    ```
    Get your API key from the Developer Dashboard → **Developer API Keys** section.

    ## Workflow Overview

    Sending a document for signing requires three steps:

    1. **Create Document** – Upload the PDF
    2. **Add Signers** – Define who needs to sign
    3. **Send for Signing** – Trigger email notifications to signers
  version: "1.0.0"
  contact:
    name: Skrivly Developer Support
    url: https://skrivly.com

servers:
  - url: http://localhost:8000/en
    description: Local Development

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Use your Developer API Key as the Bearer token.

  schemas:
    SignerInput:
      type: object
      required:
        - email
        - name
      properties:
        email:
          type: string
          format: email
          description: Signer's email address
          example: john@example.com
        name:
          type: string
          description: Signer's full name
          example: John Doe
        signer_type:
          type: string
          enum: [default, sweden_bank_id, email, otp]
          description: "Signature method. Default: `default`"
          example: default
        role:
          type: string
          enum: [signer, approver]
          description: "Signer role. Default: `signer`"
          example: signer
        phone_number:
          type: string
          description: Signer's phone number (enables SMS notification)
          example: "+46701234567"
        company_name:
          type: string
          description: Signer's company name
          example: Acme Corp
        company_address:
          type: string
          description: Signer's company address
          example: "123 Main St, Stockholm"
        is_name_editable:
          type: boolean
          description: "Allow signer to edit their name. Default: `false`"
          example: false
        hide_security_number:
          type: boolean
          description: "Hide security number. Default: `false`"
          example: false

    SignerResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        reference_signer_id:
          type: string
          description: The signer's reference ID (needed for sending)
          example: "gAAAAABpqcsY..."
        email:
          type: string
          example: john@example.com
        name:
          type: string
          example: John Doe
        signer_type:
          type: string
          example: default
        role:
          type: string
          example: signer
        status:
          type: string
          example: pending

    SendMailSignerRef:
      type: object
      required:
        - reference_signer_id
      properties:
        reference_signer_id:
          type: string
          description: Signer's `reference_signer_id` from the Add Signers response
          example: "gAAAAABpqcsY..."
        signature_type:
          type: string
          description: Signature type for this signer (optional override)

    SendDocumentRequest:
      type: object
      required:
        - data
      properties:
        message:
          type: string
          description: Custom message included in the signing email
          example: Please review and sign this document.
        data:
          type: array
          description: Array of signer references
          items:
            $ref: '#/components/schemas/SendMailSignerRef'
        external_links:
          type: array
          description: External links to attach to the document
          items:
            type: object
            properties:
              name:
                type: string
                example: Terms of Service
              value:
                type: string
                example: https://example.com/tos

    SignerUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [signed, pending]
          example: signed
        signer_reference_id:
          type: string
          example: signer-789

    ReminderRequest:
      type: object
      properties:
        message:
          type: string
          example: Please remember to sign the document.

    ResendRequest:
      type: object
      required:
        - doc_reference_id
        - organisation_doc_reference_id
      properties:
        doc_reference_id:
          type: string
          example: doc-456
        organisation_doc_reference_id:
          type: string
          example: org-doc-123

tags:
  - name: Organisation
    description: Retrieve organisation details and reference IDs
  - name: Documents
    description: Create, send, manage, and retrieve documents
  - name: Signers
    description: Add and update signers
  - name: Reminders & Resend
    description: Remind signers and resend signed documents

paths:
  /api/v1/developer-settings/profile/organization/:
    get:
      tags:
        - Organisation
      summary: Get Organisation Reference ID
      operationId: getOrganisationReference
      description: |
        Retrieve your organisation's `encrypted_reference_id`.
        This is the **first step** in the document signing workflow — the returned reference ID is required to create documents via the API.
      responses:
        "200":
          description: Organisation reference ID returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  encrypted_reference_id:
                    type: string
                    description: The encrypted reference ID for the organisation
                    example: "gAAAAABppdYi..."
        "401":
          description: Unauthorized – invalid or missing API key

  /api/v1/user-documents/details/:
    post:
      tags:
        - Documents
      summary: Create a Document
      operationId: createDocument
      description: |
        Upload a PDF document to your organisation.
        Requires the `encrypted_reference_id` obtained from the **Get Organisation Reference ID** endpoint.

        **Important:** Both `document_file` and `latest_document_file` must be provided. Send the same file for both fields.

        The response returns `reference_id` (DOC_REF_ID) and `organization_document_encrypted_reference_id` (ORG_DOC_REF_ID), which are needed for subsequent API calls.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - title
                - encrypted_reference_id
                - document_file
                - latest_document_file
              properties:
                title:
                  type: string
                  description: Document title
                  example: Sales Contract
                encrypted_reference_id:
                  type: string
                  description: Your organization's encrypted reference ID
                  example: "gAAAAABppdYi..."
                document_file:
                  type: string
                  format: binary
                  description: The PDF file to upload
                latest_document_file:
                  type: string
                  format: binary
                  description: Same PDF file (must be provided separately)
      responses:
        "201":
          description: Document created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  action:
                    type: string
                    example: data_created
                  message:
                    type: string
                    example: Document Created Successfully
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        example: "98d0c99f-e6a7-49fc-a5ff-63a9bfcb482c"
                      reference_id:
                        type: string
                        description: The document reference ID (DOC_REF_ID)
                        example: "gAAAAABpqcgx..."
                      title:
                        type: string
                        example: Sales Contract
                      status:
                        type: string
                        example: draft
                      organization_document_encrypted_reference_id:
                        type: string
                        description: The organization document reference ID (ORG_DOC_REF_ID)
                        example: "gAAAAABpqcg1..."
              example:
                status: success
                action: data_created
                message: Document Created Successfully
                data:
                  id: "98d0c99f-e6a7-49fc-a5ff-63a9bfcb482c"
                  reference_id: "gAAAAABpqcgx..."
                  title: Sales Contract
                  status: draft
                  organization_document_encrypted_reference_id: "gAAAAABpqcg1..."
        "400":
          description: Bad request – missing required fields
        "401":
          description: Unauthorized – invalid or missing API key
    get:
      tags:
        - Documents
      summary: Retrieve Document Details
      operationId: getDocumentDetails
      description: Get the details of a specific document.
      parameters:
        - name: document_organisation_reference_id
          in: query
          required: true
          schema:
            type: string
          example: org-doc-123
          description: The organization document reference ID
      responses:
        "200":
          description: Document details returned
        "401":
          description: Unauthorized
        "404":
          description: Document not found

  /api/v1/user-documents/details/signers/:
    post:
      tags:
        - Signers
      summary: Add Signers to a Document
      operationId: addSigners
      description: |
        Add one or more signers to an existing document.

        The request body is an **array** of signer objects sent directly (not wrapped in an object).

        Save the `reference_signer_id` from each signer in the response — you'll need them to send the document for signing.
      parameters:
        - name: organisation_doc_reference_id
          in: query
          required: true
          schema:
            type: string
          example: "gAAAAABpqcg1..."
          description: ORG_DOC_REF_ID from the Create Document response
        - name: doc_reference_id
          in: query
          required: true
          schema:
            type: string
          example: "gAAAAABpqcgx..."
          description: DOC_REF_ID from the Create Document response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/SignerInput'
            example:
              - email: john@example.com
                name: John Doe
                signer_type: default
                phone_number: "+46701234567"
              - email: jane@example.com
                name: Jane Smith
                signer_type: sweden_bank_id
                phone_number: "+46709876543"
      responses:
        "201":
          description: Signers added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  action:
                    type: string
                    example: data_created
                  data:
                    type: object
                    properties:
                      created:
                        type: array
                        items:
                          $ref: '#/components/schemas/SignerResponse'
                      existed:
                        type: array
                        items:
                          $ref: '#/components/schemas/SignerResponse'
              example:
                status: success
                action: data_created
                data:
                  created:
                    - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                      reference_signer_id: "gAAAAABpqcsY..."
                      email: john@example.com
                      name: John Doe
                      signer_type: default
                      role: signer
                      status: pending
                    - id: "e5f6g7h8-i9j0-1234-klmn-op5678901234"
                      reference_signer_id: "gAAAAABpqcsZ..."
                      email: jane@example.com
                      name: Jane Smith
                      signer_type: sweden_bank_id
                      role: signer
                      status: pending
                  existed: []
        "401":
          description: Unauthorized
        "404":
          description: Document not found

  /api/v1/user-documents/send-mail/:
    post:
      tags:
        - Documents
      summary: Send Document for Signing
      operationId: sendDocument
      description: |
        Send email notifications to all signers to sign the document.

        Use the `reference_signer_id` values obtained from the **Add Signers** response in the `data` array.
      parameters:
        - name: organisation_doc_reference_id
          in: query
          required: true
          schema:
            type: string
          example: "gAAAAABpqcg1..."
          description: ORG_DOC_REF_ID from the Create Document response
        - name: doc_reference_id
          in: query
          required: true
          schema:
            type: string
          example: "gAAAAABpqcgx..."
          description: DOC_REF_ID from the Create Document response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendDocumentRequest'
            example:
              message: Please review and sign this document.
              data:
                - reference_signer_id: "gAAAAABpqcsY..."
                - reference_signer_id: "gAAAAABpqcsZ..."
      responses:
        "200":
          description: Document sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  action:
                    type: string
                    example: data_retrieved
                  message:
                    type: string
                    example: Email sent successfully to the signer.
              example:
                status: success
                action: data_retrieved
                message: Email sent successfully to the signer.
        "400":
          description: Bad request – missing required fields
        "401":
          description: Unauthorized – invalid or missing API key
        "404":
          description: Document not found

  /api/v1/user-documents/sign/{reference_id}/documents/:
    patch:
      tags:
        - Signers
      summary: Update Signer Status
      operationId: updateSignerStatus
      description: Mark a signer as having signed the document.
      parameters:
        - name: reference_id
          in: path
          required: true
          schema:
            type: string
          example: doc-456
          description: Document reference ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignerUpdate'
            example:
              status: signed
              signer_reference_id: signer-789
      responses:
        "200":
          description: Signer status updated
        "401":
          description: Unauthorized
        "404":
          description: Signer or document not found

  /api/v1/user-documents/document-reminder/:
    post:
      tags:
        - Reminders & Resend
      summary: Send Reminder to Signers
      operationId: sendReminder
      description: Send a reminder email to pending signers of a document.
      parameters:
        - name: organization_doc_reference_id
          in: query
          required: true
          schema:
            type: string
          example: org-doc-123
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReminderRequest'
            example:
              message: Please remember to sign the document
      responses:
        "200":
          description: Reminder sent
        "401":
          description: Unauthorized
        "404":
          description: Document not found

  /api/v1/user-documents/documents/resend-signed/:
    post:
      tags:
        - Reminders & Resend
      summary: Resend Signed Document
      operationId: resendSignedDocument
      description: Resend the completed, signed document to the relevant parties via email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendRequest'
            example:
              doc_reference_id: doc-456
              organisation_doc_reference_id: org-doc-123
      responses:
        "200":
          description: Document resent
        "401":
          description: Unauthorized
        "404":
          description: Document not found
